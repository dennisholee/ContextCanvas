services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      CONTEXTCANVAS_DB_PATH: /data/contextcanvas.db
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
